<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Hamza Hoca ile Türkçe Öğreniyorum | Soru ve Kronometre</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --gold: #F5C842;
    --gold-dark: #C9960A;
    --bg: #0D1B2A;
    --text: #F0EAD6;
    --card-bg: #1E3552;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(245,200,66,0.07) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 90%, rgba(58,175,169,0.06) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.2rem;
  }

  /* ana kapsayıcı */
  .main-container {
    max-width: 1400px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.8rem;
  }

  /* ÜST BÖLÜM: sadece yan yana 3 sekme (arka plan şeridi) */
  .section-tabs-bar {
    background: rgba(15, 26, 38, 0.85);
    backdrop-filter: blur(8px);
    border-radius: 60px;
    border: 1px solid rgba(245,200,66,0.3);
    padding: 0.5rem 1rem;
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
  }
  .section-tab {
    background: transparent;
    border: 1.5px solid rgba(245,200,66,0.4);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    padding: 0.6rem 1.8rem;
    border-radius: 60px;
    color: rgba(240,234,214,0.85);
    cursor: pointer;
    transition: 0.2s;
    letter-spacing: 1px;
  }
  .section-tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #0D1B2A;
    border-color: transparent;
    box-shadow: 0 2px 12px rgba(245,200,66,0.5);
  }

  /* İKİ BÜYÜK KART (seçili soru - sol, kronometre - sağ) */
  .dual-big {
    display: flex;
    flex-wrap: wrap;
    gap: 1.8rem;
    justify-content: center;
    align-items: stretch;
  }
  .big-card {
    flex: 1;
    min-width: 300px;
    background: linear-gradient(145deg, #1E3552, #122133);
    border: 1.5px solid rgba(245,200,66,0.3);
    border-radius: 36px;
    padding: 1.6rem 1.3rem;
    box-shadow: 0 20px 35px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: var(--gold);
    border-left: 6px solid var(--gold);
    padding-left: 16px;
    margin-bottom: 1.2rem;
  }

  /* Seçili soru alanı (sol kart) */
  .selected-question-box {
    background: #060E18;
    border-radius: 32px;
    padding: 2rem 1.2rem;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 320px;
    border: 1px solid rgba(245,200,66,0.25);
    box-shadow: inset 0 0 14px rgba(0,0,0,0.6), 0 8px 20px rgba(0,0,0,0.3);
  }
  .question-placeholder-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    opacity: 0.6;
  }
  #selectedQuestionText {
    font-size: 1.55rem;
    font-weight: 800;
    line-height: 1.4;
    color: var(--gold);
    text-shadow: 0 1px 2px black;
    word-break: break-word;
  }
  .question-meta-badge {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: rgba(240,234,214,0.55);
    border-top: 1px dashed rgba(245,200,66,0.4);
    padding-top: 1rem;
    display: inline-block;
    align-self: center;
  }

  /* KRONOMETRE (sağ kart) - aynı stil */
  .stopwatch-inner {
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .presets-container {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 0.8rem;
    flex-wrap: wrap;
  }
  .preset-group {
    display: flex; flex-direction: column;
    align-items: center; gap: 0.3rem;
  }
  .preset-group-label {
    font-size: 0.6rem; font-weight: 800;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); opacity: 0.8;
  }
  .preset-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
  .preset-btn {
    background: rgba(245,200,66,0.1);
    border: 1.5px solid rgba(245,200,66,0.35);
    color: var(--gold);
    font-weight: 800; font-size: 0.85rem;
    padding: 0.35rem 0.9rem;
    border-radius: 60px; cursor: pointer; transition: all .15s;
  }
  .preset-btn:hover { background: rgba(245,200,66,0.28); border-color: var(--gold); transform: translateY(-2px);}
  .preset-btn.active {
    background: linear-gradient(135deg, #F5C842, #C9960A);
    color: #0D1B2A; border-color: transparent;
    box-shadow: 0 3px 12px rgba(245,200,66,0.5);
  }
  .selected-label {
    text-align: center; font-size: 0.7rem; font-weight: 700;
    color: rgba(240,234,214,0.6); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 0.8rem;
  }
  .progress-bar-wrap {
    margin-bottom: 1.2rem; height: 8px;
    background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 8px;
    background: linear-gradient(90deg, #F5C842, #2ECC71);
    transition: width 0.5s linear; width: 100%;
  }
  .progress-bar-fill.warning { background: linear-gradient(90deg, #E74C3C, #FF6B6B); }
  .display-box {
    background: #060E18;
    border: 2px solid rgba(245,200,66,0.2);
    border-radius: 32px; padding: 0.5rem 1rem;
    text-align: center; margin-bottom: 1rem;
    box-shadow: inset 0 4px 20px rgba(0,0,0,0.6);
  }
  .timer-time {
    font-family: 'Courier New', monospace;
    font-size: clamp(3rem, 11vw, 5.8rem);
    font-weight: 900; color: #F5C842;
    letter-spacing: 6px; line-height: 1.1;
    text-shadow: 0 0 30px rgba(245,200,66,0.5);
  }
  .timer-time.warning { color: #FF6B6B; text-shadow: 0 0 28px rgba(255,107,107,0.6); animation: pulse-warn 0.5s ease infinite alternate; }
  @keyframes pulse-warn { from { opacity:1; } to { opacity:0.7; } }
  .timer-time.done { color: #2ECC71; text-shadow: 0 0 20px rgba(46,204,113,0.5); animation: none; }
  .controls-row {
    display: flex; gap: 1rem; justify-content: center;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    font-weight: 800; font-size: 1rem;
    padding: 0.7rem 1.6rem; border-radius: 60px; border: none; cursor: pointer;
    transition: all .2s; min-width: 130px;
  }
  .btn-start  { background: linear-gradient(135deg, #2ECC71, #27AE60); color:#fff; box-shadow: 0 5px 18px rgba(46,204,113,.5); }
  .btn-start:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 9px 24px rgba(46,204,113,.7); }
  .btn-stop   { background: linear-gradient(135deg, #E74C3C, #C0392B); color:#fff; box-shadow: 0 5px 18px rgba(231,76,60,.5); }
  .btn-reset  { background: linear-gradient(135deg, #F1C40F, #D4AC0D); color:#0D1B2A; box-shadow: 0 5px 18px rgba(241,196,15,.5); }
  .ctrl-btn:disabled { opacity:.5; cursor: default; transform: none; }

  /* Telegram ve geri butonu */
  .top-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a2332;
    border: 2px solid #F5C842;
    border-radius: 40px;
    padding: 8px 20px;
    color: #F5C842;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: 0.2s;
    text-decoration: none;
  }
  .home-btn:hover {
    background: #2a3a4a;
    transform: translateY(-2px);
  }
  .telegram-link {
    background: rgba(34,158,217,0.15);
    border-radius: 60px;
    padding: 6px 18px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #229ED9;
    font-weight: 700;
    border: 1px solid rgba(34,158,217,0.5);
    transition: 0.2s;
  }
  .telegram-link:hover {
    background: #229ED9;
    color: white;
    transform: translateY(-2px);
  }

  /* AÇILIR PENCERE (MODAL) */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    visibility: hidden;
    opacity: 0;
    transition: visibility 0.2s, opacity 0.2s;
  }
  .modal-overlay.active {
    visibility: visible;
    opacity: 1;
  }
  .modal-container {
    background: linear-gradient(145deg, #1E3552, #0F1F2F);
    width: 90%;
    max-width: 650px;
    max-height: 80vh;
    border-radius: 48px;
    border: 2px solid rgba(245,200,66,0.5);
    box-shadow: 0 30px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 1.2rem 1.5rem;
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(245,200,66,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1.4rem;
  }
  .close-modal {
    background: none;
    border: none;
    font-size: 1.8rem;
    cursor: pointer;
    color: #F5C842;
    transition: 0.2s;
  }
  .close-modal:hover { transform: scale(1.1); }
  .modal-question-list {
    overflow-y: auto;
    padding: 1rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }
  .modal-question-item {
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: 60px;
    padding: 0.8rem 1.2rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    color: #f0ead6;
  }
  .modal-question-item:hover {
    background: rgba(245,200,66,0.2);
    border-color: var(--gold);
    transform: translateX(6px);
  }
  .modal-question-item .q-num-modal {
    font-weight: 800;
    color: var(--gold);
    margin-right: 12px;
  }
  /* alt boşluk */
  .spacer-bottom { margin-top: 2rem; }

  /* HEADER (eklenen şablon) stilleri */
  .home-btn-wrap {
    padding: 0;
    margin-bottom: 1rem;
  }
  .site-header {
    text-align: center;
    padding: 1rem 1rem 0.2rem;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #F5C842, #C9960A);
    color: #0D1B2A;
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 0.3rem 1.2rem;
    border-radius: 50px;
    margin-bottom: 0.9rem;
  }
  .site-header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1.4rem, 4.5vw, 2.5rem);
    font-weight: 800;
    color: #F5C842;
    line-height: 1.3;
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .header-line {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #F5C842, transparent);
    margin: 0 auto 10px;
  }
  .stars {
    font-size: 1rem;
    color: #F5C842;
    letter-spacing: .4em;
    margin-bottom: 6px;
    opacity: .7;
  }
  .subtitle {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .telegram-section {
    text-align: center;
    padding: 0.5rem 1rem 0.8rem;
  }
  .tg-box {
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    background: rgba(26,35,50,0.85);
    border: 1.5px solid rgba(34,158,217,0.3);
    border-radius: 60px;
    padding: .65rem 1.5rem .65rem 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tg-logo-wrap { width: 44px; height: 44px; flex-shrink: 0; }
  .tg-btn {
    display: inline-flex;
    align-items: center; gap: .45rem;
    background: linear-gradient(135deg, #229ED9, #1A7FB0);
    color: #fff; text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: .92rem;
    padding: .65rem 1.5rem;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(34,158,217,.4);
    transition: all .22s; white-space: nowrap;
  }
  .tg-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(34,158,217,.55);
  }
  .section-title {
    text-align: center;
    font-family: 'Nunito', sans-serif;
    font-size: .85rem; color: #F5C842;
    letter-spacing: 2px; text-transform: uppercase;
    margin: .2rem 0 1rem; opacity: .75;
  }
  footer {
    text-align: center;
    padding: 0 1rem 1rem;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    margin-top: 1rem;
  }
  footer span { color: #F5C842; }
  
  @media (max-width: 900px) {
    body { justify-content: flex-start; padding: 1rem; }
    .dual-big { flex-direction: column; }
    .card-title { font-size: 1.4rem; }
    #selectedQuestionText { font-size: 1.2rem; }
    .home-btn-wrap { margin-bottom: 0.5rem; }
  }
</style>
</head>
<body>
<div class="main-container">
  <!-- ========== HEADER ŞABLON (TAM EKLENMİŞ) ========== -->
  <div class="home-btn-wrap">
    <button class="home-btn" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Geri
    </button>
  </div>
  
  <div class="site-header">
    <div class="header-badge">✦ Soru-Kronometre ✦</div>
    <h1>HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</h1>
    <div class="header-line"></div>
    <div class="stars">★ ★ ★ ★ ★</div>
    <p class="subtitle"></p>
  </div>

  <div class="telegram-section">
    <div class="tg-box">
      <div class="tg-logo-wrap">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="44" height="44">
          <circle cx="24" cy="24" r="24" fill="#229ED9"/>
          <path d="M9.5 23.2l28.6-11c1.3-.5 2.5.3 2 2.2l-4.9 23c-.4 1.6-1.4 2-2.8 1.2l-7.7-5.7-3.7 3.6c-.4.4-0.8.6-1.6.6l.6-8 15-13.5c.6-.6-.1-.9-.9-.3L13.5 27.5 6 25.2c-1.5-.5-1.6-1.5.5-2z" fill="white"/>
        </svg>
      </div>
      <a href="https://t.me/TurkcheOzbekche" target="_blank" class="tg-btn">
        Kanala Katıl
      </a>
    </div>
  </div>

  <div class="section-title"></div>
  <!-- ========== HEADER ŞABLON BİTTİ ========== -->

  <!-- Üstte 3 bölüm sekmeleri (orijinal) -->
  <div class="section-tabs-bar">
    <button class="section-tab active" data-section="0">📘 1. Bölüm</button>
    <button class="section-tab" data-section="1">📖 2. Bölüm</button>
    <button class="section-tab" data-section="2">🎓 3. Bölüm</button>
  </div>

  <!-- İKİ BÜYÜK KART: SOL: SEÇİLİ SORU, SAĞ: KRONOMETRE -->
  <div class="dual-big">
    <!-- Sol kart: Seçili soru -->
    <div class="big-card">
      <div class="card-title">📌 SEÇİLİ SORU</div>
      <div class="selected-question-box">
        <div class="question-placeholder-icon">✨</div>
        <div id="selectedQuestionText">Henüz bir soru seçilmedi. Bir bölüme tıklayıp soru seçin.</div>
        <div class="question-meta-badge" id="questionMeta"></div>
      </div>
    </div>

    <!-- Sağ kart: KRONOMETRE (tamamen aynı) -->
    <div class="big-card">
      <div class="card-title">⏱️ KRONOMETRE</div>
      <div class="stopwatch-inner">
        <div class="presets-container">
          <div class="preset-group">
            <div class="preset-group-label">SANİYE</div>
            <div class="preset-row">
              <button class="preset-btn" data-seconds="5">5</button>
              <button class="preset-btn active" data-seconds="30">30</button>
              <button class="preset-btn" data-seconds="45">45</button>
            </div>
          </div>
          <div class="preset-group">
            <div class="preset-group-label">DAKİKA</div>
            <div class="preset-row">
              <button class="preset-btn" data-seconds="60">1</button>
              <button class="preset-btn" data-seconds="120">2</button>
            </div>
          </div>
        </div>
        <div class="selected-label" id="selectedLabel">Seçili: 30 saniye</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="display-box">
          <div class="timer-time" id="timerDisplay">00:30</div>
        </div>
        <div class="controls-row">
          <button class="ctrl-btn btn-start" id="btnStart">▶ BAŞLAT</button>
          <button class="ctrl-btn btn-reset" id="btnReset">↺ SIFIRLA</button>
        </div>
      </div>
    </div>
  </div>
  <div class="spacer-bottom"></div>
  <footer>
     <span>⚡</span> Hamza Hoca - Türkçe Öğrenme Platformu <span>⚡</span>
  </footer>
</div>

<!-- MODAL: açılır pencere (sorular listesi) -->
<div id="questionModal" class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="modalTitle">1. Bölüm Soruları</h3>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-question-list" id="modalQuestionList">
      <!-- dinamik sorular buraya gelir -->
    </div>
  </div>
</div>

<script>
  // ---------- TÜM SORU BANKALARI (word dosyasındaki içerikler aynen) ----------

    "Evinizin bahçesi var mı?", "En son ne zaman doktora gittiniz?", "Hangi mevsimde doğdunuz?",
    "Fotoğraf çekmek ya da çekilmek hoşunuza gider mi?", "Resim yapmak size ne tür tecrübeler kazandırır?",

    "Arkadaşlarla ders çalışmanın avantajları nelerdir?", "Yalnız mı ders çalışmayı tercih edersiniz, yoksa arkadaşlarınızla mı?",

  const bolum2 = [
    "En son ne konuda kuşkulandınız?", "O anda kendinizde ne tür bir değişiklik hissettiniz?",
    "İnsanlar neden birbirlerinden kuşkulanırlar?", "Bir şeyi neye göre seçeceksiniz?",
    "Seçim yaparken içinizden hangi duygular geçer?", "Sizce insanlar seçim yaparken neden zorlanırlar?",
    "En son önemli bir karar alırken birinden yardım istediniz mi?", "Başkalarının tavsiyelerini dikkate aldığınızda ne hissettiniz?",
    "Başkalarının önerilerine dikkat etmeli miyiz?", "Hiç yalnız kaldınız mı?",
    "Yalnızken neler hissedersiniz?", "Bazı insanlar neden yalnızlığı tercih eder?",
    "En son risk aldığınız olay nedir?", "O anda kendinizi nasıl hissettiniz? Risk almak insanlarda hangi duyguları tetikler?",
    "İnsanlar \"risk almak\" denildiğinde ne anlıyorlar?", "Herhangi bir sanat dalıyla uğraşıyor musunuz?",
    "Kendi sanatınızı icra ederken ne tür duygular hissedersiniz?", "Sizce sanat sadece bir eğlence mi yoksa bir eğitim aracı mı?",
    "Sizce ödüller neden hayatımızda vardır?", "Bir ödül için yarıştığınızda ne hissedersiniz?",
    "Kazanmak istediğiniz bir ödül hakkında bahseder misiniz?", "Kültürel çeşitlilik bir ülkenin gelişiminde nasıl bir rol oynar?",
    "Modern yaşam gelenekleri nasıl etkiliyor?", "Bir kültürün kimliğini korumak için ne tür önlemler alınabilir?",
    "Kendinizi nasıl motive edersiniz?", "Motivasyonla dolu olduğunuzda nasıl hissedersiniz?",
    "Sizce insanlara motivasyon vermenin olumsuz yönleri olabilir mi?", "En son ne zaman üzgün bir durum yaşadınız ve neden?",
    "Üzgün olduğunuzda ilk olarak ne yaparsınız? Kendinizi daha iyi hissetmek için hangi yöntemleri kullanırsınız?",
    "Sizce insanlar neden üzülür?"
  ];

  const bolum3 = [
    "Küresel ısınmayı kontrol altına alabilmek için fosil yakıt kullanımı tamamen bırakılmalı mıdır?",
    "İnsanlar, yabancı bir ülkede yaşarken yerel gelenek ve göreneklere uymalı mıdır?",
    "Tarımda verimi artırmak için kullanılan tarım ilaçlarının yasaklanması ne kadar doğrudur?",
    "Halk sağlığını korumak amacıyla hükûmetler sigara ve diğer tütün ürünlerini yasaklamalı mıdır?",
    "Hayvanlar üzerinde yapılan deneyler tamamen yasaklanmalı mıdır?",
    "Ortaokulda öğrenciler için dünya tarihinden çok yerel tarihi öğrenmek daha mı önemlidir?",
    "Yeni teknolojiler, çocukların boş zaman aktivitelerini değiştiriyor. Bu nedenle çocuklar teknolojiden uzak durmalı mı?",
    "21.yüzyılda vahşi hayvanların insanlığa doğrudan bir fayda sağlamadığı düşünülüyorsa, yine de korunmaları gerekir mi?",
    "İnsan klonlaması bilimsel bir ilerleme olarak kabul edilmeli mi, yoksa etik kaygılar nedeniyle yasaklanmalı mı?",
    "Öğrencilere istemedikleri dersleri almama özgürlüğü verilmeli midir?",
    "Çocukların doğru ile yanlışı ayırt etmeyi erken yaşta öğrenmeleri ne kadar önemlidir?",
    "Üniversite öğrencilerinin eğitimleri sürerken çalışma hayatına dahil olmaları ne kadar doğrudur?",
    "Fosil yakıtlardan enerji elde etmek varken güneş panellerinin kullanımı ne kadar doğrudur?",
    "Su kaynaklarının küresel düzeyde ortak kullanımı zorunlu hale getirilmeli midir?",
    "Yapay zekâ ile her türlü resim yapılabiliyorken, insanların bu sanat alanını öğrenmeleri için yatırım yapmalı mıyız?",
    "Günümüzde çocuklara çok fazla özgürlük verilmesi ne kadar doğrudur?",
    "Dünya dışı yaşam keşfedilirse insanlık bu varlıklarla iletişime geçmeli mi, yoksa uzak mı durmalı?",
    "Büyük şehirlerde, yapay zekâ tarafından yönetilen bir trafik sistemi uygulanmalı mıdır?",
    "Üniversite diploması iş başvurularında zorunlu bir kriter olmaktan çıkarılmalı mıdır?",
    "Elektrikli araç kullanımına geçiş zorunlu hale getirilmeli midir?",
    "Gelecekte su kıtlığı nedeniyle günlük su kullanımı sınırlandırılmalı mıdır?",
    "Sokak kedileri özgürce sokakta yaşamaya devam etmeli midir?",
    "Ülkelerin belirli bir vize politikası uygulaması ne kadar doğrudur?",
    "Üniversite eğitimi herkes için gerekli midir?",
    "Kişisel verilerin gizliliği ve korunmasına yönelik düzenlemelerin giderek daha katı hale gelmesi ne kadar doğrudur?"
  ];

  const allSections = [bolum1, bolum2, bolum3];
  const sectionNames = ["1. Bölüm", "2. Bölüm", "3. Bölüm"];

  // DOM elemanları
  const modalOverlay = document.getElementById('questionModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalListDiv = document.getElementById('modalQuestionList');
  const closeModalBtn = document.getElementById('closeModalBtn');

  const selectedQuestionSpan = document.getElementById('selectedQuestionText');
  const questionMetaSpan = document.getElementById('questionMeta');

  let currentSectionIndex = 0;   // 0,1,2

  // Modal içine soruları doldur
  function populateModal(sectionIdx) {
    const questions = allSections[sectionIdx];
    modalTitle.textContent = `${sectionNames[sectionIdx]} Soruları`;
    modalListDiv.innerHTML = '';
    questions.forEach((q, idx) => {
      const qDiv = document.createElement('div');
      qDiv.className = 'modal-question-item';
      qDiv.innerHTML = `<span class="q-num-modal">${idx+1}.</span> ${q}`;
      qDiv.addEventListener('click', () => {
        // Soru seçildi: ana ekranda göster, modal'ı kapat
        selectedQuestionSpan.innerHTML = q;
        questionMetaSpan.innerHTML = `${sectionNames[sectionIdx]} · Soru ${idx+1}`;
        closeModal();
      });
      modalListDiv.appendChild(qDiv);
    });
  }

  function openModal(sectionIdx) {
    currentSectionIndex = sectionIdx;
    populateModal(sectionIdx);
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  // Sekmeler: üstteki 3 buton - tıklanınca modal açılacak
  const sectionTabs = document.querySelectorAll('.section-tab');
  function setActiveTab(index) {
    sectionTabs.forEach((tab, i) => {
      if (i === index) tab.classList.add('active');
      else tab.classList.remove('active');
    });
  }
  sectionTabs.forEach((tab, idx) => {
    tab.addEventListener('click', () => {
      setActiveTab(idx);
      openModal(idx);
    });
  });

  // Modal kapatma: çarpı işareti veya dışarı tıklama
  closeModalBtn.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  // ---------- KRONOMETRE (orijinal fonksiyonlar aynen) ----------
  const presetBtns = document.querySelectorAll('.preset-btn');
  const timerDisplayElem = document.getElementById('timerDisplay');
  const progressFill = document.getElementById('progressFill');
  const btnStartElem = document.getElementById('btnStart');
  const btnResetElem = document.getElementById('btnReset');
  const selectedLabelSpan = document.getElementById('selectedLabel');

  let totalSeconds = 30, remaining = 30, interval = null, running = false;

  function playBell() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [[880, 0, 1.1, 0.5], [880, 0.45, 1.1, 0.38], [1320, 0.9, 1.3, 0.5]].forEach(([freq, delay, dur, vol]) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = freq;
        const t = ctx.currentTime + delay;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur);
      });
    } catch(e) {}
  }

  function fmt(sec) { return String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0'); }

  function updateDisplay() {
    timerDisplayElem.textContent = fmt(remaining);
    progressFill.style.width = (totalSeconds > 0 ? (remaining/totalSeconds)*100 : 100) + '%';
    timerDisplayElem.classList.remove('warning','done');
    progressFill.classList.remove('warning');
    if (remaining <= 0) { timerDisplayElem.classList.add('done'); progressFill.style.width='0%'; }
    else if (remaining <= 5) { timerDisplayElem.classList.add('warning'); progressFill.classList.add('warning'); }
  }

  function stopTimer() { if(interval){clearInterval(interval);interval=null;} running=false; }

  function setPreset(s) {
    stopTimer(); totalSeconds = remaining = s; updateDisplay();
    selectedLabelSpan.textContent = s<60 ? 'Seçili: '+s+' saniye' : 'Seçili: '+(s/60)+' dakika';
    presetBtns.forEach(b=>b.classList.remove('active'));
    const activeBtn = document.querySelector(`[data-seconds="${s}"]`);
    if(activeBtn) activeBtn.classList.add('active');
    btnStartElem.className='ctrl-btn btn-start'; btnStartElem.textContent='▶ BAŞLAT'; btnStartElem.disabled=false;
  }

  function startTimer() {
    if(running || remaining <= 0) return;
    running=true;
    btnStartElem.className='ctrl-btn btn-stop'; btnStartElem.textContent='⏸ DURDUR';
    interval = setInterval(()=>{
      remaining--;
      updateDisplay();
      if(remaining <= 0) {
        stopTimer();
        playBell();
        btnStartElem.className='ctrl-btn btn-start'; btnStartElem.textContent='▶ BAŞLAT';
        btnStartElem.disabled = true;
        updateDisplay();
      }
    },1000);
  }

  function resetTimer() {
    stopTimer(); remaining = totalSeconds; updateDisplay();
    btnStartElem.className='ctrl-btn btn-start'; btnStartElem.textContent='▶ BAŞLAT'; btnStartElem.disabled=false;
  }

  btnStartElem.addEventListener('click', () => {
    if(running){ stopTimer(); btnStartElem.className='ctrl-btn btn-start'; btnStartElem.textContent='▶ BAŞLAT'; }
    else startTimer();
  });
  btnResetElem.addEventListener('click', resetTimer);
  presetBtns.forEach(b=>b.addEventListener('click',()=>setPreset(parseInt(b.dataset.seconds))));
  updateDisplay();
</script>
</body>
</html>
