<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Konuşma-Yazma Ödevi | Hamza Hoca</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
  background: #1b2235;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #fff;
}

/* Hero bölümü – premium görünüm */
.hero {
  width: 100%;
  background: #1b2235;
  text-align: center;
  padding: 40px 20px 50px;
  border-bottom: 2px solid #c8a84b33;
}

.hero-badge {
  display: inline-block;
  border: 2px solid #c8a84b;
  color: #c8a84b;
  font-size: 0.75rem;
  letter-spacing: 3px;
  padding: 7px 22px;
  border-radius: 50px;
  margin-bottom: 28px;
  font-weight: 600;
  backdrop-filter: blur(4px);
}

.hero-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2rem, 6vw, 3.8rem);
  font-weight: 900;
  color: #c8a84b;
  line-height: 1.15;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.hero-stars { 
  color: #c8a84b; 
  font-size: 1.4rem; 
  letter-spacing: 6px; 
  margin-bottom: 6px; 
}

.hero-divider { 
  width: 60px; 
  height: 2px; 
  background: #c8a84b; 
  margin: 0 auto 22px; 
  border-radius: 2px; 
}

.hero-sub { 
  color: #e0c97a; 
  font-size: 0.9rem; 
  font-weight: 600; 
  margin-bottom: 22px; 
}

.btn-telegram {
  display: inline-flex; 
  align-items: center; 
  gap: 10px;
  background: #c8a84b; 
  color: #1b2235; 
  font-weight: 700; 
  font-size: 1rem;
  padding: 15px 36px; 
  border-radius: 10px; 
  text-decoration: none;
  transition: background 0.2s, transform 0.2s; 
  border: none; 
  cursor: pointer;
}

.btn-telegram:hover { 
  background: #e0c060; 
  transform: translateY(-2px); 
}

.btn-telegram svg { 
  width: 22px; 
  height: 22px; 
}

/* Ana kart */
.container { 
  text-align: center; 
  padding: 30px 20px 60px; 
  max-width: 700px; 
  width: 100%; 
}

.card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 32px;
  padding: 40px 30px;
  backdrop-filter: blur(12px);
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3);
}

/* İKİ BÜYÜK BUTON stili */
.mission-buttons {
  display: flex;
  flex-direction: column;
  gap: 28px;
  margin: 25px 0 20px;
}

.primary-action-btn {
  width: 100%;
  background: linear-gradient(105deg, #2a3b5c 0%, #1f2b42 100%);
  border: 2px solid rgba(200,168,75,0.7);
  color: #ffe5a3;
  font-size: 1.7rem;
  font-weight: 800;
  padding: 24px 20px;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  letter-spacing: 1px;
  backdrop-filter: blur(4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.primary-action-btn svg {
  width: 32px;
  height: 32px;
  fill: #c8a84b;
  transition: transform 0.2s;
}

.primary-action-btn:hover {
  transform: scale(1.02);
  background: linear-gradient(105deg, #345a7a 0%, #2a385a 100%);
  border-color: #e0bf6a;
  color: #fff2cf;
  box-shadow: 0 14px 28px rgba(0,0,0,0.4);
}

.primary-action-btn:hover svg {
  transform: translateY(-2px);
}

/* yazma butonu ikonu biraz farklı */
.write-icon {
  stroke: #c8a84b;
  stroke-width: 1.5;
}

/* alt bilgi ve uyarı */
.info-note {
  margin-top: 35px;
  font-size: 0.75rem;
  color: #9aa3c2;
  background: rgba(0,0,0,0.25);
  border-radius: 40px;
  padding: 10px 20px;
  display: inline-block;
  backdrop-filter: blur(2px);
}

/* Modal / Sayfa geçişi efekti (içerik yönlendirme ve geçici mesaj) */
.loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  transition: visibility 0.2s, opacity 0.2s;
  color: #ffe6a3;
  font-family: 'Playfair Display', serif;
}

.loading-overlay.active {
  visibility: visible;
  opacity: 1;
}

.loading-spinner {
  width: 64px;
  height: 64px;
  border: 5px solid rgba(200,168,75,0.3);
  border-top: 5px solid #c8a84b;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  margin-bottom: 24px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-text-overlay {
  font-size: 1.6rem;
  font-weight: bold;
  letter-spacing: 2px;
}

/* Responsive */
@media (max-width: 550px) {
  .primary-action-btn {
    font-size: 1.3rem;
    padding: 18px 16px;
  }
  .primary-action-btn svg {
    width: 26px;
    height: 26px;
  }
  .card {
    padding: 30px 20px;
  }
  .hero-title {
    font-size: 1.7rem;
  }
}
</style>
</head>
<body>

<!-- HERO BANNER - telegram kanal korunuyor -->
<div class="hero">
  <div class="hero-badge">✦ KONUŞMA-YAZMA ÖDEVİ ✦</div>
  <div class="hero-title">HAMZA HOCA İLE<br>TÜRKÇE ÖĞRENİYORUM</div>
  <div class="hero-stars">★ ★ ★ ★ ★</div>
  <div class="hero-divider"></div>
  <p class="hero-sub"></p>
  <a class="btn-telegram" href="https://t.me/TurkcheOzbekche" target="_blank">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
    Kanala Katıl
  </a>
</div>

<div class="container">
  <div class="card">
    <!-- SADECE İKİ BÜYÜK BUTON + bilgilendirme 
         - Yazarak Gönder butonu -> egitim_platformu.html
         - Konuşarak Gönder butonu -> konusma_yazma.html
    -->
    <div class="mission-buttons">
      <!-- 1. Yazarak Gönder butonu (hedef: egitim_platformu.html) -->
      <button id="writeBtn" class="primary-action-btn">
        <svg class="write-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15.232 5.232L18.768 8.768M16.5 3.5L19.5 6.5M5 19L7.5 18.5L17.5 8.5L14.5 5.5L4.5 15.5L5 19Z" stroke="#c8a84b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M4 20L9 18L20 7L17 4L6 15L4 20Z" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
        </svg>
        ✍️ Yazarak Gönder
      </button>

      <!-- 2. Konuşarak Gönder butonu (hedef: konusma_yazma.html - sesli/yazılı ödev platformu) -->
      <button id="speakBtn" class="primary-action-btn">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C10.8954 3 10 3.89543 10 5V12C10 13.1046 10.8954 14 12 14C13.1046 14 14 13.1046 14 12V5C14 3.89543 13.1046 3 12 3Z" stroke="#c8a84b" stroke-width="1.5" fill="none"/>
          <path d="M5 12C5 15.866 8.13401 19 12 19C15.866 19 19 15.866 19 12" stroke="#c8a84b" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <path d="M12 19V21" stroke="#c8a84b" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="12" cy="6" r="1.5" fill="#c8a84b" stroke="#c8a84b" stroke-width="0.8"/>
        </svg>
        🎙️ Konuşarak Gönder
      </button>
    </div>
    <div class="info-note">
      📌 Yazarak Gönder ➡ yazılı ödev platformu (egitim_platformu.html) &nbsp;&nbsp;|&nbsp;&nbsp; 🎙️ Konuşarak Gönder ➡ sesli/yazılı ödev sayfası
    </div>
  </div>
</div>

<!-- Sayfa geçiş overlay (yönlendirme efekti) -->
<div id="routeOverlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text-overlay" id="overlayMessage">Yönlendiriliyor</div>
  <div style="margin-top: 20px; font-size: 0.9rem;" id="targetHint">sayfa açılıyor...</div>
</div>

<script>
  // ============================================================
  // GÜNCELLEME: "Yazarak Gönder" butonu -> egitim_platformu.html
  // "Konuşarak Gönder" butonu -> konusma_yazma.html (orijinal sesli/yazılı ödev)
  // Tasarım ve telegram kısmı aynen korunur, iki büyük buton net şekilde çalışır.
  // Ayrıca overlay ile kullanıcıya bilgi verilir.
  // ============================================================
  
  const writeButton = document.getElementById('writeBtn');   // Yazarak Gönder
  const speakButton = document.getElementById('speakBtn');   // Konuşarak Gönder
  const overlay = document.getElementById('routeOverlay');
  const overlayMsgSpan = document.getElementById('overlayMessage');
  const targetHintSpan = document.getElementById('targetHint');
  
  // Ortak yönlendirme fonksiyonu
  function redirectToPage(targetFile, modeName, customMessage = '') {
    // modeName sadece görsel mesaj için
    if (overlay) {
      if (customMessage) {
        overlayMsgSpan.innerHTML = customMessage;
      } else {
        overlayMsgSpan.innerHTML = modeName === 'write' ? '✍️ Yazma ödevi hazırlanıyor' : '🎤 Konuşma ödevi hazırlanıyor';
      }
      if (targetHintSpan) {
        targetHintSpan.innerHTML = `${targetFile} sayfasına yönlendiriliyor...`;
      }
      overlay.classList.add('active');
    }
    
    // kısa gecikme ile sayfayı aç (kullanıcı deneyimi)
    setTimeout(() => {
      window.location.href = targetFile;
    }, 380);
  }
  
  // 1) Yazarak Gönder butonu: egitim_platformu.html dosyasını aç
  if (writeButton) {
    writeButton.addEventListener('click', (e) => {
      e.preventDefault();
      // Hedef: egitim_platformu.html (aynı dizinde bulunmalı)
      redirectToPage('egitim_platformu.html', 'write', '📝 Eğitim Platformuna Yönlendiriliyor');
    });
  }
  
  // 2) Konuşarak Gönder butonu: konusma_yazma.html dosyasını aç (sesli ve yazılı ödevler için)
  if (speakButton) {
    speakButton.addEventListener('click', (e) => {
      e.preventDefault();
      // Hedef: konusma_yazma.html
      redirectToPage('konusma_yazma.html', 'speak', '🎙️ Konuşma ve Yazma Ödevi Sayfası');
    });
  }
  
  // Konsol bilgisi (debug)
  console.log("✅ GÜNCELLENMİŞ SAYFA: Yazarak Gönder -> egitim_platformu.html | Konuşarak Gönder -> konusma_yazma.html");
  
  // Not: Eğer egitim_platformu.html veya konusma_yazma.html dosyaları mevcut değilse, GitHub Pages üzerinde 404 hatası verir.
  // Kullanıcıya herhangi bir uyarı gösterilmez, doğal tarayıcı davranışı.
  // Dosyaların index.html ile aynı klasörde olduğundan emin olunmalıdır.
  
  // Butonların net şekilde ayrımını sağlamak için alt bilgi güncellendi.
  // Tüm tasarım ve premium his korunmuştur.
  // İstenen özellik birebir uygulandı: "yazarak gönder butonuna basılınca egitim_platformu.html dosyası çalışsın".
  // Konuşarak gönder butonu ise özgün konusma_yazma.html'e yönlendirir.
</script>

</body>
</html>
