<style>
  :root { --gold:#F5C842; --gold-dark:#C9960A; --bg:#0D1B2A; --bg2:#162032; --text:#F0EAD6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:linear-gradient(135deg,#0D1B2A 0%,#1a2a3a 100%); color:var(--text); min-height:100vh; overflow-x:hidden; }
  header { text-align:center; padding:2.5rem 1rem 1.2rem; }
  .header-badge { display:inline-block; background:linear-gradient(135deg,#F5C842,#C9960A); color:#0D1B2A; font-size:.68rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; padding:.3rem 1.2rem; border-radius:50px; margin-bottom:.9rem; }
  header h1 { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; font-size:clamp(1.4rem,4.5vw,2.5rem); font-weight:800; color:#F5C842; line-height:1.3; letter-spacing:.02em; }
  .stars { text-align:center; font-size:1rem; opacity:.35; letter-spacing:6px; margin:.5rem 0; }
  .divider { width:80px; height:3px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:.8rem auto; border-radius:2px; }
  header p { color:rgba(240,234,214,.42); font-size:.82rem; letter-spacing:.4px; }
  .telegram-section { text-align:center; padding:.5rem 1rem 1rem; }
  .tg-box { display:inline-flex; align-items:center; gap:1rem; background:rgba(22,32,50,.85); border:1.5px solid rgba(34,158,217,.3); border-radius:60px; padding:.75rem 1.5rem .75rem 1rem; flex-wrap:wrap; justify-content:center; }
  .tg-logo-wrap { width:44px; height:44px; flex-shrink:0; }
  .tg-btn { display:inline-flex; align-items:center; gap:.45rem; background:linear-gradient(135deg,#229ED9,#1A7FB0); color:#fff; text-decoration:none; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; font-weight:800; font-size:.92rem; padding:.65rem 1.5rem; border-radius:50px; box-shadow:0 4px 20px rgba(34,158,217,.4); transition:all .22s; white-space:nowrap; }
  .tg-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(34,158,217,.55); }
  .section-block { margin-bottom:2.5rem; }
  .section-title-main { text-align:center; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; font-size:1.1rem; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin:1.5rem 0 .4rem; opacity:.9; }
  .section-subtitle { text-align:center; font-size:.75rem; color:rgba(240,234,214,.4); letter-spacing:1px; margin-bottom:1.2rem; }
  .section-divider { width:120px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:.4rem auto 1.2rem; border-radius:2px; }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1.2rem; padding:0 1.5rem; max-width:1200px; margin:0 auto; }
  .card-wrap          { height:250px; cursor:pointer; perspective:1000px; -webkit-perspective:1000px; }
  .card-wrap.tall     { height:440px; }
  .card-wrap.multi    { height:360px; }
  .card-wrap.img-card { height:340px; }
  .card-inner { position:relative; width:100%; height:100%; transition:transform .6s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d; -webkit-transform-style:preserve-3d; }
  .card-wrap.flipped .card-inner { transform:rotateY(180deg); -webkit-transform:rotateY(180deg); }
  .card-face { position:absolute; top:0; left:0; width:100%; height:100%; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.45rem; padding:1rem 1.3rem; border:1.5px solid rgba(245,200,66,.15); box-shadow:0 6px 24px rgba(0,0,0,.4); -webkit-backface-visibility:hidden; backface-visibility:hidden; }
  .card-front, .card-front.s2, .card-front.s3, .card-front.s4 { background:linear-gradient(145deg,#1E3552,#122133); }
  .card-back, .card-back.s2, .card-back.s3, .card-back.s4 { background:linear-gradient(145deg,#103828,#071E12); border-color:rgba(58,175,169,.25); transform:rotateY(180deg); -webkit-transform:rotateY(180deg); }
  .card-front .card-keyword { color:#FFF3A3; }
  .card-front .card-sep    { background:#FFF3A3; }
  .card-back  .card-keyword { color:#7EFFF5; }
  .card-back  .card-sep    { background:#7EFFF5; }
  .card-keyword { font-size:1rem; font-weight:900; text-align:center; letter-spacing:.3px; line-height:1.3; }
  .card-sep { width:40px; height:2px; border-radius:2px; opacity:.3; flex-shrink:0; }
  .counter { position:absolute; top:9px; left:12px; font-size:.56rem; font-weight:800; opacity:.25; letter-spacing:.5px; }
  .flip-hint { position:absolute; bottom:8px; font-size:.54rem; opacity:.18; letter-spacing:1px; text-transform:uppercase; }
  .card-wrap:hover { box-shadow:0 0 18px rgba(245,200,66,.22); border-radius:16px; }
  .timer-btn { display:inline-flex; align-items:center; gap:.4rem; background:linear-gradient(135deg,#F5C842,#C9960A); color:#0D1B2A; border:none; cursor:pointer; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; font-weight:800; font-size:.78rem; padding:.38rem .9rem; border-radius:50px; box-shadow:0 3px 12px rgba(245,200,66,.4); transition:all .18s; white-space:nowrap; flex-shrink:0; }
  .timer-btn:hover { transform:translateY(-1px); box-shadow:0 5px 18px rgba(245,200,66,.6); }
  .timer-btn:disabled { opacity:.5; cursor:default; transform:none; }
  .timer-display { font-size:.9rem; font-weight:900; color:#F5C842; letter-spacing:1px; min-width:2.4rem; text-align:center; display:none; }
  .timer-display.warning { color:#FF6B6B; }
  .timer-row { display:flex; align-items:center; gap:.5rem; margin-top:.3rem; }
  /* Multi card */
  .multi-front-qs { width:100%; text-align:left; }
  .multi-front-q-item { font-size:.78rem; font-weight:700; color:#FFF3A3; padding:.3rem 0; border-bottom:1px solid rgba(255,243,163,.1); line-height:1.35; }
  .multi-front-q-item:last-child { border-bottom:none; }
  .q-num { opacity:.45; margin-right:.3rem; font-weight:900; }
  .multi-back-item { width:100%; border-top:1px solid rgba(126,255,245,.12); padding-top:.45rem; margin-top:.4rem; }
  .multi-back-item:first-child { border-top:none; padding-top:0; margin-top:0; }
  .multi-back-q { font-size:.65rem; font-weight:800; color:#7EFFF5; opacity:.65; letter-spacing:.3px; margin-bottom:.2rem; }
  .multi-back-a { font-size:.72rem; font-weight:600; color:var(--text); line-height:1.5; opacity:.88; }
  /* Image card */
  .img-row { display:flex; gap:.5rem; justify-content:center; width:100%; }
  .img-row img { width:48%; height:110px; object-fit:cover; border-radius:8px; border:1.5px solid rgba(245,200,66,.2); }
  .bottom-space { height:3rem; }
</style>

function formatTime(sec) {
  const m=Math.floor(sec/60), s=sec%60;
  return m>0 ? m+":"+String(s).padStart(2,"0") : String(s);
}

  let interval=null, remaining=seconds, running=false;
  function flip() { wrap.classList.add("flipped"); stopTimer(); }
  function stopTimer() { if(interval){clearInterval(interval);interval=null;} running=false; btn.disabled=true; btn.textContent="✓ Süre Bitti"; }
  function reset() { if(interval){clearInterval(interval);interval=null;} running=false; remaining=seconds; btn.disabled=false; btn.textContent="Süreyi Başlat"; disp.style.display="none"; disp.textContent=formatTime(seconds); disp.classList.remove("warning"); }
  function startTimer() {
    if(running) return; running=true; btn.disabled=true; btn.textContent="⏱";
    disp.style.display="inline-block"; disp.textContent=formatTime(remaining);
    interval=setInterval(()=>{ remaining--; disp.textContent=formatTime(remaining); if(remaining<=5)disp.classList.add("warning"); if(remaining<=0)flip(); },1000);
  }
  btn.addEventListener("click", e=>{ e.stopPropagation(); startTimer(); });
  wrap.addEventListener("click", ()=>{ if(!wrap.classList.contains("flipped")){ flip(); } else { wrap.classList.remove("flipped"); reset(); } });
}
