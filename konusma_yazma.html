<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Yazma & Konuşma Platformu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }

        .login-section { max-width: 400px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: border-color 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { min-height: 200px; resize: vertical; }
        button { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 15px; text-align: center; background: #f0f0f0; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .record-section { text-align: center; padding: 30px; background: #f8f9fa; border-radius: 15px; margin: 20px 0; }
        .record-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: #ff4757; 
            color: white; font-size: 24px; border: none; cursor: pointer; 
            transition: all 0.3s; margin: 10px; display: inline-flex; align-items: center; justify-content: center;
        }
        .record-btn:hover { transform: scale(1.1); }
        .record-btn.recording { background: #2ed573; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(46, 213, 115, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); } }
        .timer { font-size: 24px; font-weight: bold; color: #333; margin: 15px 0; }
        .audio-preview { margin: 15px 0; }

        .status { padding: 15px; border-radius: 10px; margin: 15px 0; text-align: center; font-weight: 600; display: none; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.info { background: #d1ecf1; color: #0c5460; display: block; }

        .teacher-panel { display: none; }
        .submission-card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #667eea; }
        .submission-header { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.yazma { background: #e3f2fd; color: #1976d2; }
        .badge.konusma { background: #fce4ec; color: #c2185b; }
        .badge.yeni { background: #fff3e0; color: #e65100; }
        .badge.duzeltildi { background: #e8f5e9; color: #2e7d32; }

        .hidden { display: none; }

        @media (max-width: 600px) { .container { padding: 15px; } .tabs { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Yazma & Konuşma Platformu</h1>
        <p class="subtitle">Öğrenci Girişi ve Gönderim Sistemi</p>

        <!-- LOGIN -->
        <div id="loginSection" class="login-section">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="password" placeholder="Şifrenizi girin">
            </div>
            <button onclick="login()">Giriş Yap</button>
            <div id="loginStatus" class="status"></div>
        </div>

        <!-- STUDENT PANEL -->
        <div id="studentPanel" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Hoş geldin, <span id="studentName"></span>!</h2>
                <button onclick="logout()" style="width: auto; padding: 10px 20px;">Çıkış</button>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('yazma')">✍️ Yazma</div>
                <div class="tab" onclick="switchTab('konusma')">🎙️ Konuşma</div>
            </div>

            <!-- YAZMA -->
            <div id="yazmaSection">
                <div class="form-group">
                    <label>Soru Seçin</label>
                    <select id="yazmaSoru">
                        <option value="">-- Soru seçin --</option>
                        <option value="Evinizin bahçesi var mı? Evinizin bahçesi var mı? Var ise bahçenizde neler var? Yoksa bahçe istiyor musunuz?">Evinizin bahçesi var mı?</option>
                        <option value="En son ne zaman doktora gittiniz? En son ne zaman doktora gittiniz? Neden gitmiştiniz? Doktor sizi nasıl muayene etti?">En son ne zaman doktora gittiniz?</option>
                        <option value="Hangi mevsimde doğdunuz? Hangi mevsimde doğdunuz? O mevsimi seviyor musunuz? Neden?">Hangi mevsimde doğdunuz?</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cevabınızı Yazın</label>
                    <textarea id="yazmaCevap" placeholder="Cevabınızı buraya yazın..."></textarea>
                </div>
                <button onclick="submitYazma()">Gönder</button>
                <div id="yazmaStatus" class="status"></div>
            </div>

            <!-- KONUSMA -->
            <div id="konusmaSection" class="hidden">
                <div class="form-group">
                    <label>Soru Seçin</label>
                    <select id="konusmaSoru">
                        <option value="">-- Soru seçin --</option>
                        <option value="Evinizin bahçesi var mı?">Evinizin bahçesi var mı?</option>
                        <option value="En son ne zaman doktora gittiniz?">En son ne zaman doktora gittiniz?</option>
                        <option value="Hangi mevsimde doğdunuz?">Hangi mevsimde doğdunuz?</option>
                    </select>
                </div>

                <div class="record-section">
                    <p>Mikrofon izni verip kayda başlayın:</p>
                    <button class="record-btn" id="recordBtn" onclick="toggleRecord()">🎤</button>
                    <div class="timer" id="timer">00:00</div>
                    <div class="audio-preview" id="audioPreview"></div>
                </div>

                <button onclick="submitKonusma()" id="submitKonusmaBtn" disabled>Gönder</button>
                <div id="konusmaStatus" class="status"></div>
            </div>

            <!-- MY SUBMISSIONS -->
            <div style="margin-top: 40px;">
                <h3>📋 Gönderilerim</h3>
                <div id="mySubmissions"></div>
            </div>
        </div>

        <!-- TEACHER PANEL -->
        <div id="teacherPanel" class="teacher-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>👨‍🏫 Öğretmen Paneli</h2>
                <button onclick="logout()" style="width: auto; padding: 10px 20px;">Çıkış</button>
            </div>
            <div id="teacherSubmissions"></div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        // Google Sheets Web App URL'nizi buraya yapıştırın
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ9bl_GJKKwWqItFIHlAfKd14JiUK_t13LE5Cba2mwSL1HoYzUwNS_jF_EEw3bYWMe5Q/exec';

        // Cloudinary Config
        const CLOUDINARY_CLOUD_NAME = 'dee5ahvyy';
        const CLOUDINARY_UPLOAD_PRESET = 'konusma_yazma';

        // ==================== STATE ====================
        let currentUser = null;
        let isTeacher = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedBlob = null;
        let recordTimer = null;
        let recordSeconds = 0;
        let isRecording = false;

        // ==================== LOGIN ====================
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showStatus('loginStatus', 'Lütfen kullanıcı adı ve şifre girin!', 'error');
                return;
            }

            if (username === 'ogretmen' && password === 'admin123') {
                currentUser = { username: 'ogretmen', name: 'Öğretmen' };
                isTeacher = true;
                showTeacherPanel();
                return;
            }

            showStatus('loginStatus', 'Giriş yapılıyor...', 'info');

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
                const result = await response.json();

                if (result.success) {
                    currentUser = { username: username, name: result.name || username };
                    isTeacher = false;
                    showStudentPanel();
                } else {
                    showStatus('loginStatus', 'Kullanıcı adı veya şifre hatalı!', 'error');
                }
            } catch (e) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => u.username === username && u.password === password);

                if (user) {
                    currentUser = { username: username, name: user.name || username };
                    isTeacher = false;
                    showStudentPanel();
                } else {
                    showStatus('loginStatus', 'Giriş başarısız!', 'error');
                }
            }
        }

        function logout() {
            currentUser = null;
            isTeacher = false;
            location.reload();
        }

        // ==================== PANELS ====================
        function showStudentPanel() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('studentPanel').classList.remove('hidden');
            document.getElementById('studentName').textContent = currentUser.name;
            loadMySubmissions();
        }

        function showTeacherPanel() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('teacherPanel').style.display = 'block';
            loadTeacherSubmissions();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'yazma') {
                document.getElementById('yazmaSection').classList.remove('hidden');
                document.getElementById('konusmaSection').classList.add('hidden');
            } else {
                document.getElementById('yazmaSection').classList.add('hidden');
                document.getElementById('konusmaSection').classList.remove('hidden');
            }
        }

        // ==================== YAZMA ====================
        async function submitYazma() {
            const soru = document.getElementById('yazmaSoru').value;
            const cevap = document.getElementById('yazmaCevap').value.trim();

            if (!soru || !cevap) {
                showStatus('yazmaStatus', 'Lütfen soru seçin ve cevap yazın!', 'error');
                return;
            }

            const data = {
                action: 'submit',
                type: 'yazma',
                username: currentUser.username,
                name: currentUser.name,
                soru: soru,
                cevap: cevap,
                tarih: new Date().toLocaleString('tr-TR')
            };

            showStatus('yazmaStatus', 'Gönderiliyor...', 'info');

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.success) {
                    showStatus('yazmaStatus', 'Cevabınız başarıyla gönderildi!', 'success');
                    document.getElementById('yazmaCevap').value = '';
                    loadMySubmissions();
                }
            } catch (e) {
                saveToLocal(data);
                showStatus('yazmaStatus', 'Demo mod: Cevabınız kaydedildi!', 'success');
                document.getElementById('yazmaCevap').value = '';
                loadMySubmissions();
            }
        }

        // ==================== KONUSMA (SES KAYDI) ====================
        async function toggleRecord() {
            if (!isRecording) {
                await startRecording();
            } else {
                stopRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(recordedBlob);
                    document.getElementById('audioPreview').innerHTML = `
                        <audio controls src="${audioUrl}" style="width: 100%;"></audio>
                    `;
                    document.getElementById('submitKonusmaBtn').disabled = false;
                };

                mediaRecorder.start();
                isRecording = true;

                const btn = document.getElementById('recordBtn');
                btn.classList.add('recording');
                btn.innerHTML = '⏹️';

                recordSeconds = 0;
                recordTimer = setInterval(() => {
                    recordSeconds++;
                    const mins = Math.floor(recordSeconds / 60).toString().padStart(2, '0');
                    const secs = (recordSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('timer').textContent = `${mins}:${secs}`;
                }, 1000);

            } catch (err) {
                showStatus('konusmaStatus', 'Mikrofon erişimi reddedildi! Lütfen izin verin.', 'error');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());

                isRecording = false;
                clearInterval(recordTimer);

                const btn = document.getElementById('recordBtn');
                btn.classList.remove('recording');
                btn.innerHTML = '🎤';
            }
        }

        async function submitKonusma() {
            const soru = document.getElementById('konusmaSoru').value;

            if (!soru || !recordedBlob) {
                showStatus('konusmaStatus', 'Lütfen soru seçin ve ses kaydı yapın!', 'error');
                return;
            }

            showStatus('konusmaStatus', 'Ses dosyası yükleniyor...', 'info');

            try {
                const timestamp = Date.now();
                const filename = `${currentUser.username}_${timestamp}`;

                const formData = new FormData();
                formData.append('file', recordedBlob, `${filename}.webm`);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                formData.append('public_id', filename);

                const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!uploadRes.ok) {
                    const errorData = await uploadRes.json();
                    throw new Error(errorData.error?.message || 'Yükleme başarısız');
                }

                const uploadData = await uploadRes.json();
                const audioUrl = uploadData.secure_url;

                const data = {
                    action: 'submit',
                    type: 'konusma',
                    username: currentUser.username,
                    name: currentUser.name,
                    soru: soru,
                    audioUrl: audioUrl,
                    tarih: new Date().toLocaleString('tr-TR')
                };

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                if (result.success) {
                    showStatus('konusmaStatus', 'Ses kaydınız başarıyla gönderildi!', 'success');
                    resetKonusma();
                    loadMySubmissions();
                }
            } catch (e) {
                console.error('Hata:', e);
                const data = {
                    action: 'submit',
                    type: 'konusma',
                    username: currentUser.username,
                    name: currentUser.name,
                    soru: soru,
                    audioUrl: 'demo_audio_url',
                    tarih: new Date().toLocaleString('tr-TR')
                };
                saveToLocal(data);
                showStatus('konusmaStatus', 'Demo mod: Ses kaydı kaydedildi!', 'success');
                resetKonusma();
                loadMySubmissions();
            }
        }

        function resetKonusma() {
            recordedBlob = null;
            document.getElementById('audioPreview').innerHTML = '';
            document.getElementById('timer').textContent = '00:00';
            document.getElementById('submitKonusmaBtn').disabled = true;
            document.getElementById('konusmaSoru').value = '';
        }

        // ==================== GOOGLE SHEETS INTEGRATION ====================

        // Öğrenci: Gönderilerimi Google Sheets'ten çek
        async function loadMySubmissions() {
            const container = document.getElementById('mySubmissions');

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getSubmissions&username=${encodeURIComponent(currentUser.username)}`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    renderSubmissions(container, result.data);
                } else {
                    // Google Sheets boşsa localStorage'a bak
                    const localSubs = JSON.parse(localStorage.getItem('submissions') || '[]')
                        .filter(s => s.username === currentUser.username);
                    if (localSubs.length > 0) {
                        renderSubmissions(container, localSubs);
                    } else {
                        container.innerHTML = '<p style="color: #999; text-align: center;">Henüz gönderiniz yok.</p>';
                    }
                }
            } catch (e) {
                // Offline: localStorage'dan göster
                const localSubs = JSON.parse(localStorage.getItem('submissions') || '[]')
                    .filter(s => s.username === currentUser.username);
                if (localSubs.length > 0) {
                    renderSubmissions(container, localSubs);
                } else {
                    container.innerHTML = '<p style="color: #999; text-align: center;">Henüz gönderiniz yok.</p>';
                }
            }
        }

        // Öğretmen: Tüm gönderileri Google Sheets'ten çek
        async function loadTeacherSubmissions() {
            const container = document.getElementById('teacherSubmissions');

            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllSubmissions`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    renderTeacherSubmissions(container, result.data);
                } else {
                    const localSubs = JSON.parse(localStorage.getItem('submissions') || '[]');
                    if (localSubs.length > 0) {
                        renderTeacherSubmissions(container, localSubs);
                    } else {
                        container.innerHTML = '<p style="color: #999; text-align: center;">Henüz gönderi yok.</p>';
                    }
                }
            } catch (e) {
                const localSubs = JSON.parse(localStorage.getItem('submissions') || '[]');
                if (localSubs.length > 0) {
                    renderTeacherSubmissions(container, localSubs);
                } else {
                    container.innerHTML = '<p style="color: #999; text-align: center;">Henüz gönderi yok.</p>';
                }
            }
        }

        // Öğretmen: Düzeltmeyi Google Sheets'e kaydet
        async function saveDuzeltmeToSheets(rowIndex, duzeltme) {
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateDuzeltme',
                        rowIndex: rowIndex,
                        duzeltme: duzeltme,
                        durum: 'Düzeltildi'
                    })
                });
                const result = await response.json();
                return result.success;
            } catch (e) {
                return false;
            }
        }

        // ==================== RENDER FUNCTIONS ====================

        function renderSubmissions(container, submissions) {
            container.innerHTML = submissions.reverse().map(s => `
                <div class="submission-card">
                    <div class="submission-header">
                        <span class="badge ${s.type}">${s.type === 'yazma' ? '✍️ Yazma' : '🎙️ Konuşma'}</span>
                        <span class="badge ${s.durum === 'Yeni' ? 'yeni' : 'duzeltildi'}">${s.durum || 'Yeni'}</span>
                    </div>
                    <p><strong>Soru:</strong> ${(s.soru || '').substring(0, 100)}...</p>
                    ${s.type === 'yazma' 
                        ? `<p><strong>Cevap:</strong> ${(s.cevap || '').substring(0, 150)}...</p>` 
                        : `<p><strong>Ses:</strong> <a href="${s.audioUrl || s[6] || '#'}" target="_blank">Dinle</a></p>`
                    }
                    <p style="color: #666; font-size: 14px; margin-top: 10px;">${s.tarih || s[0] || ''}</p>
                    ${(s.duzeltme || s[8]) 
                        ? `<div style="background: #e8f5e9; padding: 10px; border-radius: 8px; margin-top: 10px;"><strong>Öğretmen Düzeltmesi:</strong><br>${s.duzeltme || s[8]}</div>` 
                        : ''
                    }
                </div>
            `).join('');
        }

        function renderTeacherSubmissions(container, submissions) {
            container.innerHTML = submissions.reverse().map((s, idx) => `
                <div class="submission-card" data-row="${s.rowIndex || (submissions.length - idx)}">
                    <div class="submission-header">
                        <div>
                            <span class="badge ${s.type || s[3]}">${(s.type || s[3]) === 'yazma' ? '✍️ Yazma' : '🎙️ Konuşma'}</span>
                            <span class="badge ${(s.durum || s[7] || 'Yeni') === 'Yeni' ? 'yeni' : 'duzeltildi'}">${s.durum || s[7] || 'Yeni'}</span>
                            <strong style="margin-left: 10px;">${s.name || s[2] || ''}</strong>
                        </div>
                        <span style="color: #666; font-size: 14px;">${s.tarih || s[0] || ''}</span>
                    </div>
                    <p><strong>Soru:</strong> ${s.soru || s[4] || ''}</p>
                    ${(s.type || s[3]) === 'yazma' 
                        ? `<div style="background: white; padding: 15px; border-radius: 8px; margin: 10px 0;"><strong>Öğrenci Cevabı:</strong><br>${s.cevap || s[5] || ''}</div>`
                        : `<p><strong>Ses Kaydı:</strong> <a href="${s.audioUrl || s[6] || '#'}" target="_blank">🎵 Dinlemek için tıklayın</a></p>`
                    }
                    <div style="margin-top: 15px;">
                        <textarea id="duzeltme-${s.rowIndex || (submissions.length - idx)}" placeholder="Düzeltmenizi buraya yazın..." style="min-height: 80px; margin-bottom: 10px;">${s.duzeltme || s[8] || ''}</textarea>
                        <button onclick="saveDuzeltme(${s.rowIndex || (submissions.length - idx)})" style="width: auto; padding: 10px 20px;">Düzeltmeyi Kaydet</button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== LOCAL STORAGE (BACKUP) ====================
        function saveToLocal(data) {
            let submissions = JSON.parse(localStorage.getItem('submissions') || '[]');
            data.id = Date.now();
            data.duzeltme = '';
            data.durum = 'Yeni';
            data.rowIndex = submissions.length + 2; // Sheets satır numarası (header + 1)
            submissions.push(data);
            localStorage.setItem('submissions', JSON.stringify(submissions));
        }

        // ==================== TEACHER ACTIONS ====================
        async function saveDuzeltme(rowIndex) {
            const duzeltme = document.getElementById(`duzeltme-${rowIndex}`).value;

            // Önce Google Sheets'e kaydetmeyi dene
            const savedToSheets = await saveDuzeltmeToSheets(rowIndex, duzeltme);

            if (savedToSheets) {
                showStatus('teacherSubmissions', 'Düzeltme Google Sheets'e kaydedildi!', 'success');
            } else {
                // Fallback: localStorage'a kaydet
                let submissions = JSON.parse(localStorage.getItem('submissions') || '[]');
                const index = submissions.findIndex(s => (s.rowIndex || s.id) === rowIndex);

                if (index !== -1) {
                    submissions[index].duzeltme = duzeltme;
                    submissions[index].durum = 'Düzeltildi';
                    localStorage.setItem('submissions', JSON.stringify(submissions));
                }
                showStatus('teacherSubmissions', 'Düzeltme kaydedildi (localStorage)', 'success');
            }

            loadTeacherSubmissions();
        }

        // ==================== UTILS ====================
        function showStatus(id, message, type) {
            const el = document.getElementById(id);
            if (!el) return;

            // Eğer container ise, içine status div ekle
            if (el.classList.contains('submission-card') || el.id === 'teacherSubmissions' || el.id === 'mySubmissions') {
                const statusDiv = document.createElement('div');
                statusDiv.className = `status ${type}`;
                statusDiv.textContent = message;
                statusDiv.style.display = 'block';
                el.insertBefore(statusDiv, el.firstChild);
                setTimeout(() => statusDiv.remove(), 5000);
                return;
            }

            el.textContent = message;
            el.className = `status ${type}`;
            setTimeout(() => { el.style.display = 'none'; }, 5000);
            el.style.display = 'block';
        }

        // Demo kullanıcıları
        if (!localStorage.getItem('users')) {
            localStorage.setItem('users', JSON.stringify([
                { username: 'ahmet', password: '123456', name: 'Ahmet Yılmaz' },
                { username: 'ayse', password: '123456', name: 'Ayşe Demir' }
            ]));
        }
    </script>
</body>
</html>
