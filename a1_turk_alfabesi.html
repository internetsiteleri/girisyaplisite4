<script>
  // Alfabe verisi (29 harf + örnek kelimeler)
  const alphabet = [
    { l:'A', w:['araba','anne','ayak'] },
    { l:'B', w:['baba','balık','burun'] },
    { l:'C', w:['cam','ceket','cadde'] },
    { l:'Ç', w:['çanta','çilek','çorba'] },
    { l:'D', w:['deniz','dil','dağ'] },
    { l:'E', w:['ev','ekmek','el'] },
    { l:'F', w:['fare','fırtına','fincan'] },
    { l:'G', w:['göz','gün','gül'] },
    { l:'Ğ', w:['dağ','yağmur','eğitim'] },
    { l:'H', w:['hava','hayvan','hastane'] },
    { l:'I', w:['ışık','ırmak','ılık'] },
    { l:'İ', w:['insan','iş','inek'] },
    { l:'J', w:['jimnastik','jeton','jandarma'] },
    { l:'K', w:['kedi','kitap','kapı'] },
    { l:'L', w:['lamba','limon','lale'] },
    { l:'M', w:['masa','mavi','meyve'] },
    { l:'N', w:['nehir','nesne','nane'] },
    { l:'O', w:['okul','orman','oyun'] },
    { l:'Ö', w:['ördek','öğretmen','öpücük'] },
    { l:'P', w:['para','pencere','pazar'] },
    { l:'R', w:['rüzgar','renk','resim'] },
    { l:'S', w:['su','sabah','saat'] },
    { l:'Ş', w:['şeker','şehir','şapka'] },
    { l:'T', w:['top','taş','tren'] },
    { l:'U', w:['uçak','uyku','uzay'] },
    { l:'Ü', w:['üzüm','ülke','ütü'] },
    { l:'V', w:['vakit','vücut','volkan'] },
    { l:'Y', w:['yıldız','yemek','yol'] },
    { l:'Z', w:['zaman','zebra','zeytin'] }
  ];

  const lcMap = {
    A:'a',B:'b',C:'c',Ç:'ç',D:'d',E:'e',F:'f',G:'g',Ğ:'ğ',
    H:'h',I:'ı',İ:'i',J:'j',K:'k',L:'l',M:'m',N:'n',O:'o',
    Ö:'ö',P:'p',R:'r',S:'s',Ş:'ş',T:'t',U:'u',Ü:'ü',V:'v',Y:'y',Z:'z'
  };

  let trVoice = null;

  // Ses motoru başlatma
  function initVoices() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return;
    trVoice = voices.find(v => v.lang === 'tr-TR') || voices.find(v => v.lang.startsWith('tr')) || null;
    const banner = document.getElementById('voice-banner');
    if (!trVoice && banner) {
      banner.style.display = 'block';
      banner.textContent = '🔊 Uyarı: Türkçe ses sentezlenemeyebilir. Lütfen Chrome, Edge veya modern bir tarayıcı kullanın.';
    } else if (banner) {
      banner.style.display = 'none';
    }
  }

  if ('speechSynthesis' in window) {
    speechSynthesis.onvoiceschanged = initVoices;
    initVoices();
    setTimeout(() => {
      if (!trVoice) initVoices();
    }, 400);
  } else {
    const banner = document.getElementById('voice-banner');
    if(banner) {
      banner.style.display = 'block';
      banner.textContent = '⚠️ Tarayıcınız ses sentezini desteklemiyor.';
    }
  }

  function cancelSpeechAndClear() {
    if (window.speechSynthesis) {
      speechSynthesis.cancel();
    }
    document.querySelectorAll('.playing').forEach(el => el.classList.remove('playing'));
  }

  function speakText(text, targetElement) {
    if (!window.speechSynthesis) return;
    cancelSpeechAndClear();

    setTimeout(() => {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'tr-TR';
      utterance.rate = 0.82;
      utterance.pitch = 1.02;
      if (trVoice) utterance.voice = trVoice;

      if (targetElement) {
        targetElement.classList.add('playing');
        utterance.onend = () => targetElement.classList.remove('playing');
        utterance.onerror = () => targetElement.classList.remove('playing');
      }

      speechSynthesis.speak(utterance);
    }, 50);
  }

  const gridContainer = document.getElementById('alphabet-grid');
  if (gridContainer) {
    alphabet.forEach((item, idx) => {
      const { l, w } = item;
      const colorIndex = idx % 8;
      const className = `card ${'c' + colorIndex}`;
      const lowerLetter = lcMap[l] || l.toLowerCase();

      const wordsHtml = w.map(word => `
        <div class="word-row" data-word="${word}">
          <span class="ws">🔊</span>
          <span class="wt">${word}</span>
        </div>
      `).join('');

      const cardDiv = document.createElement('div');
      cardDiv.className = className;
      cardDiv.innerHTML = `
        <div class="card-top">
          <div class="letter-block">
            <span class="lu">${l}</span>
            <span class="ll">${lowerLetter}</span>
          </div>
          <button class="sb" data-letter="${l}" title="Sesi dinle">🔊</button>
        </div>
        <div class="div"></div>
        <div class="words-list">
          ${wordsHtml}
        </div>
      `;
      gridContainer.appendChild(cardDiv);
    });
  }

  // Olay dinleyicilerini bağlama
  function attachEvents() {
    document.querySelectorAll('.sb').forEach(btn => {
      btn.removeEventListener('click', letterClickHandler);
      btn.addEventListener('click', letterClickHandler);
    });
    document.querySelectorAll('.word-row').forEach(row => {
      row.removeEventListener('click', wordClickHandler);
      row.addEventListener('click', wordClickHandler);
    });
  }

  function letterClickHandler(e) {
    e.stopPropagation();
    const letter = this.getAttribute('data-letter');
    if (letter) speakText(letter, this);
  }

  function wordClickHandler(e) {
    const wordRow = this.closest('.word-row');
    if (wordRow) {
      const wordTextElem = wordRow.querySelector('.wt');
      if (wordTextElem) {
        const word = wordTextElem.innerText;
        speakText(word, wordRow);
      }
    }
  }

  attachEvents();
  // Dinamik olarak kartlar yüklendiğinde tekrar bağlamak için
  window.addEventListener('load', () => {
    attachEvents();
    if (!trVoice && speechSynthesis) {
      setTimeout(() => {
        const voices = speechSynthesis.getVoices();
        trVoice = voices.find(v => v.lang === 'tr-TR') || voices.find(v => v.lang.startsWith('tr'));
        const banner = document.getElementById('voice-banner');
        if (!trVoice && banner) {
          banner.style.display = 'block';
          banner.textContent = '🔊 Türkçe ses için lütfen Chrome/Edge/Safari güncel sürüm kullanın.';
        } else if (trVoice && banner) {
          banner.style.display = 'none';
        }
      }, 300);
    }
  });
